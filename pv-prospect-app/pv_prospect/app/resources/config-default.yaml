# Path to the promoted-artifact store written by pv-prospect-model-trainer bootstrap.
# Override in config-local.yaml with the path from your local bootstrap run.
store_dir: '/tmp/pv-prospect-models'
# Local-dev defaults; override via VALIDATION_WINDOW_DIR / RESOURCES_DIR env vars in prod.
validation_window_dir: '/tmp/pv-prospect-validation-window'
resources_dir: 'resources'
# Per-IP rate limits on the public endpoints. Override via RATE_LIMIT_* env vars
# in prod (Cloud Run) to tune without a redeploy. trusted_hops selects the client
# IP from the right of X-Forwarded-For; 1 = direct *.run.app, raise to 2 behind a
# load balancer — see rate_limit.py and verify on first deploy.
rate_limit_enabled: true
rate_limit_predict: '20/minute'
rate_limit_validate: '30/minute'
rate_limit_trusted_hops: 1
