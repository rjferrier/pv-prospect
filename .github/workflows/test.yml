name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - pv-prospect-common
          - pv-prospect-physics
          - pv-prospect-etl
          - pv-prospect-data-sources
          - pv-prospect-data-extraction
          - pv-prospect-data-transformation
          - pv-prospect-data-versioner

    defaults:
      run:
        working-directory: ${{ matrix.package }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pipx install poetry==2.3.2

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: ${{ matrix.package }}/.venv
          key: venv-${{ matrix.package }}-${{ hashFiles(format('{0}/poetry.lock', matrix.package)) }}

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest tests/
