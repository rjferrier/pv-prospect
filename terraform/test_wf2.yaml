main:
  params: [args]
  steps:
    - init:
        assign:
          - raw_pv_system_ids: ${default(map.get(args, "pv_system_ids"), [])}
    - check:
        switch:
          - condition: ${json.encode_to_string(raw_pv_system_ids) == "\"all\""}
            return: "It was all"
        next: return_val
    - return_val:
        return: ${raw_pv_system_ids}
