exclude: ^uk-geo/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
    - id: ruff-check
      types_or: [ python, pyi ]
      args: [ --fix ]
    - id: ruff-format
      types_or: [ python, pyi ]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
    -   id: mypy
        exclude: ^(data-exploration/.*|.*/__init__\.py|.*/tests/.*)$
        args: [
          "--ignore-missing-imports",
          "--disallow-untyped-defs",
          "--pretty",
          "--explicit-package-bases",
          "--namespace-packages"
        ]
        additional_dependencies: ['types-PyYAML']

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        exclude: ^.*/tests/.*$

  - repo: local
    hooks:
      - id: render-diagrams
        name: Render PlantUML diagrams
        language: script
        entry: .hooks/render-diagrams.sh
        files: ^doc/.*\.puml$
        pass_filenames: true

      - id: regenerate-uk-grid
        name: Regenerate UK grid images
        language: script
        entry: .hooks/regenerate-uk-grid.sh
        always_run: true
        pass_filenames: false
