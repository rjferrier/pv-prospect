services:
  runner:
    build:
      context: ..
      dockerfile: pv-prospect-data-extraction/Dockerfile
      target: runner
    container_name: pvprospect-dataextraction-runner
    env_file:
      - worker.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: "/root/.config/gcloud/application_default_credentials.json"
    volumes:
      - ./out:/data/out
      - ${HOME}/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
    profiles:
      - manual

  # ---------------------------------------------------------------------------
  # Legacy Celery-based services (optional, retained for backward compat)
  # ---------------------------------------------------------------------------

  rabbitmq:
    image: rabbitmq:3-management
    container_name: pvprospect-dataextraction-rabbitmq
    ports:
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: "user"
      RABBITMQ_DEFAULT_PASS: "password"
    restart: unless-stopped
    profiles:
      - celery

  worker:
    build:
      context: ..
      dockerfile: pv-prospect-data-extraction/Dockerfile
      target: worker
    container_name: pvprospect-dataextraction-worker
    env_file:
      - worker.env
    environment:
      CELERY_BROKER_URL: "amqp://user:password@rabbitmq:5672//"
      CELERY_RESULT_BACKEND: "rpc://"
      GOOGLE_APPLICATION_CREDENTIALS: "/root/.config/gcloud/application_default_credentials.json"
    volumes:
      - ./out:/data/out
      - ./pv_prospect/data_extraction/resources/gdrive_credentials.json:/app/pv-prospect-data-extraction/pv_prospect/data_extraction/resources/gdrive_credentials.json:ro
      - ./pv_prospect/data_extraction/resources/gdrive_token.json:/app/pv-prospect-data-extraction/pv_prospect/data_extraction/resources/gdrive_token.json:ro
      - ${HOME}/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
    depends_on:
      - rabbitmq
    restart: on-failure
    profiles:
      - celery

  flower:
    build:
      context: ..
      dockerfile: pv-prospect-data-extraction/Dockerfile
      target: flower
    container_name: pvprospect-dataextraction-flower
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: "amqp://user:password@rabbitmq:5672//"
      CELERY_RESULT_BACKEND: "rpc://"
    depends_on:
      - rabbitmq
      - worker
    restart: on-failure
    profiles:
      - celery

  taskproducer:
    build:
      context: ..
      dockerfile: pv-prospect-data-extraction/Dockerfile
      target: cli
    container_name: pvprospect-dataextraction-taskproducer
    environment:
      CELERY_BROKER_URL: "amqp://user:password@rabbitmq:5672//"
      CELERY_RESULT_BACKEND: "rpc://"
    volumes:
      - ./pv_prospect/data_extraction/resources/gdrive_credentials.json:/app/pv-prospect-data-extraction/pv_prospect/data_extraction/resources/gdrive_credentials.json:ro
      - ./pv_prospect/data_extraction/resources/gdrive_token.json:/app/pv-prospect-data-extraction/pv_prospect/data_extraction/resources/gdrive_token.json:ro
    depends_on:
      - rabbitmq
      - worker
    profiles:
      - celery
