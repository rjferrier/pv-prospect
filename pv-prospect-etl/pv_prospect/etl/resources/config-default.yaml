# The staging bucket has three top-level prefixes:
#   data/      — extracted and processed data
#   tracking/  — manifests, cursors, ledger entries, and write-audit logs
#   resources/ — supporting data that has been manually collected and assembled
# Each second-level prefix below carves out its own subtree.
#
# Raw extracted data is the exception: it lives in its own durable archive bucket
# (pv-prospect-raw), not under staging/data/raw. Extraction writes it and transform
# reads it via staged_raw_data_storage below; a lifecycle rule tiers it to Coldline
# after 8 days. See the archive-raw-data task.

resources_storage:
  backend: 'gcs'
  bucket_name: 'pv-prospect-staging'
  prefix: 'resources'

staged_raw_data_storage:
  backend: 'gcs'
  bucket_name: 'pv-prospect-raw'

staged_cleaned_data_storage:
  backend: 'gcs'
  bucket_name: 'pv-prospect-staging'
  prefix: 'data/cleaned'

staged_prepared_batches_data_storage:
  backend: 'gcs'
  bucket_name: 'pv-prospect-staging'
  prefix: 'data/prepared-batches'

staged_prepared_data_storage:
  backend: 'gcs'
  bucket_name: 'pv-prospect-staging'
  prefix: 'data/prepared'

validation_window_storage:
  backend: 'gcs'
  bucket_name: 'pv-prospect-staging'
  prefix: 'data/served/validation-window'

manifests_storage:
  backend: 'gcs'
  bucket_name: 'pv-prospect-staging'
  prefix: 'tracking/manifests'

cursors_storage:
  backend: 'gcs'
  bucket_name: 'pv-prospect-staging'
  prefix: 'tracking/cursors'

ledger_storage:
  backend: 'gcs'
  bucket_name: 'pv-prospect-staging'
  prefix: 'tracking/ledger'

log_storage:
  backend: 'gcs'
  bucket_name: 'pv-prospect-staging'
  prefix: 'tracking/logs'

versioned_feature_data_storage:
  backend: 'gcs'
  bucket_name: 'pv-prospect-versioned-feature'
